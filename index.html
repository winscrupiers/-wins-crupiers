<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINS CRUPIERS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
padding:20px;
position:relative;
background:black;
}

/* ================= FONDO REAL CASINO ================= */

body::before{
content:"";
position:fixed;
inset:0;
z-index:-5;

background:
linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.8)),
url("https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=1920");

background-size:cover;
background-position:center;

animation:zoom 18s ease-in-out infinite alternate;
filter:contrast(1.1) saturate(1.2);
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

/* ================= RULETA REAL ================= */

.roulette{
position:fixed;
bottom:-250px;
left:50%;
transform:translateX(-50%) rotateX(65deg);
width:500px;
height:500px;
background:url("https://images.unsplash.com/photo-1606166325695-7c2b8e5c5d1a?q=80&w=1200");
background-size:cover;
background-position:center;
border-radius:50%;
opacity:.6;
filter:blur(1px);
animation:spin 25s linear infinite;
z-index:-3;
}

@keyframes spin{
to{transform:translateX(-50%) rotateX(65deg) rotate(360deg)}
}

/* ================= OBJETOS REALISTAS ================= */

.obj{
position:fixed;
bottom:-100px;
background-size:contain;
background-repeat:no-repeat;
opacity:0;
animation:float linear infinite;
z-index:-2;
}

/* fichas */
.chip{
width:80px;
height:80px;
background-image:url("https://cdn-icons-png.flaticon.com/512/1041/1041886.png");
}

/* cartas */
.card{
width:90px;
height:120px;
background-image:url("https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Playing_card_ace_of_hearts.svg/512px-Playing_card_ace_of_hearts.svg.png");
}

/* dados */
.dice{
width:70px;
height:70px;
background-image:url("https://cdn-icons-png.flaticon.com/512/3616/3616789.png");
}

/* posiciones */
.obj1{left:10%;animation-duration:16s;animation-delay:0s;}
.obj2{left:25%;animation-duration:18s;animation-delay:2s;}
.obj3{left:50%;animation-duration:20s;animation-delay:4s;}
.obj4{left:70%;animation-duration:17s;animation-delay:1s;}
.obj5{left:85%;animation-duration:19s;animation-delay:3s;}

@keyframes float{
0%{transform:translateY(0) rotate(0);opacity:0;}
20%{opacity:.7;}
100%{transform:translateY(-120vh) rotate(180deg);opacity:0;}
}

/* ================= CARD PRINCIPAL ================= */

.card-ui{
width:100%;
max-width:420px;
background:rgba(15,3,3,.9);
border:1px solid rgba(255,211,107,.4);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 50px rgba(255,200,80,.3);
backdrop-filter:blur(12px);
}

/* LOGO */
.logo{
width:240px;
margin:0 auto 15px;
display:block;
filter:drop-shadow(0 0 20px rgba(255,211,107,.6));
}

/* TEXTO */
h1{
font-size:32px;
margin-bottom:15px;
}

h1 span{
color:#ffd36b;
}

.amount{
font-size:60px;
font-weight:900;
color:#ffd36b;
margin:20px 0;
text-shadow:0 0 20px rgba(255,211,107,.8);
}

.subtitle{
margin-bottom:20px;
color:#f5e6c7;
}

/* BOTONES */
button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:900;
margin-top:10px;
cursor:pointer;
font-size:16px;
}

.whatsapp{
background:linear-gradient(#ffe49a,#e5aa32);
color:#1b0707;
}

.webchat{
background:linear-gradient(#25d366,#128c4a);
color:#041b0d;
}

/* MOBILE */
@media(max-width:600px){
.amount{font-size:70px;}
.logo{width:260px;}
}

</style>
</head>

<body>

<div class="roulette"></div>

<div class="obj chip obj1"></div>
<div class="obj chip obj2"></div>
<div class="obj card obj3"></div>
<div class="obj dice obj4"></div>
<div class="obj chip obj5"></div>

<div class="card-ui">

<img src="wins-logo.png" class="logo">

<h1>Hoy volvés con <span>ventaja</span></h1>

<div class="amount">20%</div>

<div class="subtitle">
Activá tu beneficio por WhatsApp y empezá de nuevo con WINS CRUPIERS.
</div>

<button class="whatsapp">Reclamar por WhatsApp</button>
<button class="webchat">Abrir Webchat</button>

</div>

</body>
</html>
