<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINS CRUPIERS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  min-height:100vh;
  background:linear-gradient(160deg,#050303,#3b0707);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* CARD ORIGINAL */

.card{
  width:360px;
  padding:25px;
  border-radius:25px;
  background:linear-gradient(180deg,#140505,#070404);
  border:1px solid rgba(255,210,110,.3);
  text-align:center;
}

.logo{
  font-size:40px;
  font-weight:bold;
  color:#d40b0b;
  text-shadow:0 0 10px gold;
}

.badge{
  margin:15px 0;
  font-size:12px;
  color:#ffd36b;
}

h1{
  font-size:26px;
}

h1 span{
  color:#ffd36b;
}

.box{
  margin:20px 0;
  padding:15px;
  border-radius:15px;
  background:#5a0505;
}

.amount{
  font-size:40px;
  color:#ffd36b;
}

.cta{
  margin-top:20px;
  width:100%;
  padding:15px;
  border-radius:15px;
  font-weight:bold;
  background:linear-gradient(#ffe49a,#e5aa32);
  border:none;
  cursor:pointer;
}

/* OASIS ESTILO WINS */

.oasis-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.oasis-overlay.active{
  display:flex;
}

.oasis-box{
  width:90%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
  padding:30px;
  border-radius:25px;
  background:linear-gradient(180deg,#140505,#070404);
  border:1px solid rgba(255,210,110,.3);
  text-align:center;
}

.oasis-box h2 span{
  color:#ffd36b;
}

.oasis-grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.oasis-card{
  display:flex;
  gap:10px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  text-decoration:none;
  color:white;
}

.oasis-card:hover{
  background:rgba(255,211,107,.1);
}

.close{
  float:right;
  cursor:pointer;
}

@media(max-width:700px){
  .oasis-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">WINS</div>
  <div class="badge">BENEFICIO ACTIVO</div>

  <h1>HOY VOLVES CON <span>VENTAJA</span></h1>

  <div class="box">
    <div>Disponible para tu próxima carga</div>
    <div class="amount">20%</div>
  </div>

  <button class="cta" id="abrirOasis">
    RECLAMAR POR WHATSAPP
  </button>
</div>

<!-- OASIS -->
<div class="oasis-overlay" id="oasis">
  <div class="oasis-box">
    <div class="close" id="cerrar">X</div>

    <h2>Tu <span>Oasis</span> de Atención</h2>
    <p>Elegí una línea disponible</p>

    <div class="oasis-grid" id="grid"></div>
  </div>
</div>

<script>
const numeros = [
"595993428272","595993600664","595993531681","595994148120",
"595992683436","595992105336","595992693270","595994185084",
"595993421681","595993426758","595993519840","596992119729",
"595976671481","595992894317","595993421542","595994626921",
"595993421241","595993264332","595993253159","595972383786",
"595993426536","595993253595","595993264272","595993264678",
"595991368797","595993038750","595993264389","595993264618",
"595993519515","595972929173","595971629879","595972904825",
"595992117657","595992119721","595993519506"
];

const grid = document.getElementById("grid");

numeros.forEach((num,i)=>{
  const a = document.createElement("a");
  a.href = `https://wa.me/${num}?text=QUIERO20`;
  a.target = "_blank";
  a.className = "oasis-card";
  a.innerHTML = `Línea ${i+1}<br>${num}`;
  grid.appendChild(a);
});

document.getElementById("abrirOasis").onclick=()=>{
  document.getElementById("oasis").classList.add("active");
}

document.getElementById("cerrar").onclick=()=>{
  document.getElementById("oasis").classList.remove("active");
}
</script>

</body>
</html>
