<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WINS CRUPIERS | Beneficio Activo</title>

  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at center, rgba(255, 190, 60, 0.18), transparent 34%),
        linear-gradient(160deg, #050303 0%, #180606 42%, #3b0707 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .page {max-width: 430px;width:100%;}
    .glow {
      position:absolute;width:260px;height:260px;
      background:rgba(255,196,72,.16);filter:blur(60px);
      border-radius:50%;top:-90px;right:-90px;
    }

    .card {
      border:1px solid rgba(255,210,110,.35);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(20,5,5,.95), rgba(7,4,4,.96));
      padding:28px 22px;
      text-align:center;
    }

    .wins {font-size:42px;font-weight:900;color:#b70f12;text-shadow:0 0 10px gold;}
    .crupiers {font-size:22px;color:#ffd36b;font-style:italic;}

    .badge {
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,211,107,.12);
      border:1px solid rgba(255,211,107,.35);
      color:#ffd36b;
      margin:18px 0;
    }

    h1 span{color:#ffd36b;}

    .amount-box {
      margin:20px 0;
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(112,10,10,.45), rgba(35,5,5,.7));
    }

    .amount {font-size:46px;font-weight:900;color:#ffd36b;}

    .cta {
      width:100%;
      padding:16px;
      border-radius:18px;
      font-weight:900;
      border:none;
      cursor:pointer;
      margin-top:10px;
    }

    .webchat-btn {
      background:linear-gradient(180deg,#25d366,#128c4a);
      color:#041b0d;
    }

    .oasis-overlay{
      position:fixed;inset:0;display:none;
      align-items:center;justify-content:center;
      background:rgba(0,0,0,.82);
    }

    .oasis-overlay.active{display:flex;}

    .oasis-box{
      width:90%;max-width:900px;
      background:#140505;
      border-radius:28px;
      padding:30px;
    }

    .oasis-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .oasis-card{
      padding:12px;
      background:#1e0b0b;
      border-radius:10px;
      color:white;
      text-decoration:none;
    }

    .close{cursor:pointer;}
  </style>
</head>

<body>

<main class="page">
  <div class="glow"></div>

  <section class="card">
    <div class="wins">WINS</div>
    <div class="crupiers">Crupiers</div>

    <div class="badge">BENEFICIO ACTIVO</div>

    <h1>Hoy volvés con <span>ventaja</span></h1>

    <div class="amount-box">
      <div>Disponible para tu próxima carga</div>
      <div class="amount">20%</div>
    </div>

    <button class="cta" id="abrirOasis">Reclamar por WhatsApp</button>
    <button class="cta webchat-btn" id="abrirWebchat">Abrir Webchat</button>
  </section>
</main>

<div class="oasis-overlay" id="oasis">
  <div class="oasis-box">
    <div class="close" id="cerrar">X</div>
    <h2>Tu Wins de Atención</h2>
    <div class="oasis-grid" id="grid"></div>
  </div>
</div>

<script>
const TODOS_LOS_NUMEROS = [
"595993428272","595993600664","595993531681","595994148120",
"595992683436","595992105336","595992693270","595994185084",
"595993421681","595993426758","595993519840","596992119729",
"595976671481","595992894317","595993421542","595994626921",
"595993421241","595993264332","595993253159","595972383786",
"595993426536","595993253595","595993264272","595993264678",
"595991368797","595993038750","595993264389","595993264618",
"595993519515","595972929173","595971629879","595972904825",
"595992117657","595992119721","595993519506"
];

function mezclar(lista){
  return [...lista].sort(()=>Math.random()-0.5);
}

function cargarOasis(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  mezclar(TODOS_LOS_NUMEROS).slice(0,6).forEach((num,i)=>{
    const a=document.createElement("a");
    a.href=`https://wa.me/${num}?text=QUIERO20`;
    a.target="_blank";
    a.className="oasis-card";
    a.innerHTML=`Línea ${i+1}<br>${num}`;
    grid.appendChild(a);
  });
}

document.getElementById("abrirOasis").onclick=()=>{
  cargarOasis();
  document.getElementById("oasis").classList.add("active");
};

document.getElementById("cerrar").onclick=()=>{
  document.getElementById("oasis").classList.remove("active");
};

document.getElementById("abrirWebchat").onclick=()=>{
  if(window.Callbell){
    window.Callbell("open_chat");
    return;
  }

  const esperar=setInterval(()=>{
    if(window.Callbell){
      window.Callbell("open_chat");
      clearInterval(esperar);
    }
  },300);
};
</script>

</body>
</html>
