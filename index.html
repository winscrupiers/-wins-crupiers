<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINS CRUPIERS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

body{
min-height:100vh;
background:radial-gradient(circle at 50% 35%,rgba(255,196,72,.16),transparent 28%),linear-gradient(160deg,#050202 0%,#130404 45%,#3a0606 100%);
display:flex;
align-items:center;
justify-content:center;
color:white;
padding:22px;
}

.card{
width:100%;
max-width:390px;
background:linear-gradient(180deg,rgba(18,5,5,.98),rgba(5,3,3,.98));
border:1px solid rgba(255,211,107,.38);
border-radius:26px;
padding:30px 22px;
text-align:center;
box-shadow:0 0 45px rgba(255,190,60,.16);
}

.logo{
font-size:44px;
font-weight:900;
letter-spacing:1px;
color:#d71920;
text-shadow:0 2px 0 #ffd36b,0 0 22px rgba(255,200,80,.55);
}

.sublogo{
font-size:20px;
color:#ffd36b;
margin-top:-3px;
margin-bottom:22px;
}

.badge{
display:inline-block;
font-size:12px;
font-weight:800;
letter-spacing:.5px;
color:#ffd36b;
border:1px solid rgba(255,211,107,.35);
background:rgba(255,211,107,.1);
border-radius:999px;
padding:8px 13px;
margin-bottom:18px;
}

h1{
font-size:25px;
line-height:1.1;
margin-bottom:12px;
text-transform:uppercase;
}

h1 span{color:#ffd36b}

.amount{
margin:18px 0;
padding:17px;
border-radius:20px;
background:linear-gradient(180deg,rgba(104,8,8,.45),rgba(30,4,4,.75));
border:1px solid rgba(255,211,107,.25);
}

.amount small{
display:block;
font-size:12px;
color:#f5dba0;
margin-bottom:5px;
text-transform:uppercase;
}

.amount strong{
font-size:48px;
color:#ffd36b;
text-shadow:0 0 18px rgba(255,200,80,.5);
}

.text{
font-size:15px;
line-height:1.4;
color:#f8e9c9;
margin-bottom:20px;
}

.buttons{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
display:block;
width:100%;
padding:16px;
border-radius:17px;
text-decoration:none;
font-weight:900;
font-size:16px;
text-transform:uppercase;
}

.btn-gold{
background:linear-gradient(180deg,#ffe49a,#e3aa34);
color:#1b0707;
box-shadow:0 0 24px rgba(255,204,84,.35);
}

.btn-white{
background:linear-gradient(180deg,#ffffff,#dedede);
color:#111;
}

.note{
font-size:12px;
color:rgba(255,255,255,.55);
margin-top:16px;
line-height:1.35;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">WINS</div>
  <div class="sublogo">Crupiers</div>

  <div class="badge">BENEFICIO ACTIVO</div>

  <h1>Hoy volvés con <span>ventaja</span></h1>

  <div class="amount">
    <small>Disponible para tu próxima carga</small>
    <strong id="beneficio">20%</strong>
  </div>

  <p class="text">
    Activá tu beneficio ahora y escribinos por el medio que prefieras.
  </p>

  <div class="buttons">
    <a href="#" class="btn btn-gold" id="whatsappBtn">Reclamar por WhatsApp</a>
    <a href="#" class="btn btn-white" onclick="abrirChat()">Reclamar desde la web</a>
  </div>

  <p class="note">
    Beneficio sujeto a disponibilidad. Atención activa las 24 hs.
  </p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const beneficio = params.get("beneficio");

if (beneficio) {
  document.getElementById("beneficio").textContent = beneficio;
}

const numerosWhatsApp = [
  "595974876315",
  "595972904825",
  "595993253595"
];

const mensaje = encodeURIComponent("QUIERO20");

document.getElementById("whatsappBtn").addEventListener("click", function(e){
  e.preventDefault();
  const numero = numerosWhatsApp[Math.floor(Math.random()*numerosWhatsApp.length)];
  window.open(`https://wa.me/${numero}?text=${mensaje}`, "_blank");
});

function abrirChat(){
  if(window.callbell && typeof window.callbell.open === "function"){
    window.callbell.open();
  } else {
    setTimeout(function(){
      if(window.callbell && typeof window.callbell.open === "function"){
        window.callbell.open();
      }
    }, 1500);
  }
}
</script>

<script>
if (!window.callbellSettings) {
  window.callbellSettings = {};
}
window.callbellSettings["uuid"] = "591b8d8f-2863-4b6f-8371-cf66ec2e4620";
window.callbellSettings["script_token"] = "YxhRGuSVgudQ3pPuDJC8cqC8";
</script>

<script>
(function(){
  var w = window;
  var d = document;
  var l = function(){
    var s = d.createElement("script");
    s.async = true;
    s.src = "https://dash.callbell.eu/include/livechat/" + window.callbellSettings.script_token + "/" + window.callbellSettings.uuid + ".js";
    var x = d.getElementsByTagName("script")[0];
    x.parentNode.insertBefore(s, x);
  };
  w.addEventListener("load", l, false);
})();
</script>

</body>
</html>
