<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINS CRUPIERS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(160deg,#050303,#3b0707);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 360px;
  padding: 25px;
  border-radius: 25px;
  background: linear-gradient(180deg,#140505,#070404);
  border: 1px solid rgba(255,210,110,.3);
  text-align: center;
}

.cta {
  margin-top: 20px;
  width: 100%;
  padding: 15px;
  border-radius: 15px;
  font-weight: bold;
  background: linear-gradient(#ffe49a,#e5aa32);
  border: none;
  cursor: pointer;
}

/* OASIS */

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: none;
  justify-content: center;
  align-items: center;
}

.overlay.active {
  display: flex;
}

.panel {
  background: #1b6d85;
  width: 90%;
  max-width: 700px;
  border-radius: 25px;
  padding: 30px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
  margin-top: 20px;
}

.line {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 15px;
  background: rgba(255,255,255,.1);
  border-radius: 15px;
  text-decoration: none;
  color: white;
}

.close {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>WINS CRUPIERS</h2>
  <p>Beneficio activo</p>

  <h1>20%</h1>

  <button class="cta" id="btn">
    RECLAMAR POR WHATSAPP
  </button>
</div>

<!-- OASIS -->
<div class="overlay" id="overlay">
  <div class="panel">
    <div class="close" id="close">X</div>

    <h2>Tu Oasis de Atención</h2>

    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const numeros = [
"595992056044",
"595992656438",
"595993496972",
"595972884337",
"595992237429",
"595993482833",
"595992659425",
"595992187028"
];

const mensaje = "QUIERO EL 20%";

// abrir oasis
document.getElementById("btn").onclick = () => {
  document.getElementById("overlay").classList.add("active");
};

// cerrar
document.getElementById("close").onclick = () => {
  document.getElementById("overlay").classList.remove("active");
};

// generar botones
const grid = document.getElementById("grid");

numeros.forEach((num,i)=>{
  const a = document.createElement("a");
  a.href = `https://wa.me/${num}?text=${encodeURIComponent(mensaje)}`;
  a.target = "_blank";
  a.className = "line";
  a.innerHTML = `Línea ${i+1}<br>${num}`;
  grid.appendChild(a);
});
</script>

</body>
</html>
