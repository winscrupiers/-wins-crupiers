<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINS CRUPIERS</title>

<style>
body {
  margin:0;
  background:#0b0505;
  font-family:Arial;
}

/* ===== BOTONES ===== */
.cta {
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:900;
  margin:10px;
  cursor:pointer;
}

/* ===== GLOW CORREGIDO ===== */
.webchat-glow {
  display: none;
  position: fixed;
  right: 26px;   /* ← AJUSTADO */
  bottom: 26px;  /* ← AJUSTADO */
  width: 95px;
  height: 95px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,211,107,0.65) 0%, rgba(255,211,107,0.12) 55%, transparent 75%);
  filter: blur(6px);
  z-index: 9998;
  pointer-events: none;
  animation: glowPulse 1.4s infinite alternate;
}

body.webchat-visible .webchat-glow {
  display: block;
}

@keyframes glowPulse {
  from { opacity: .55; transform: scale(0.92); }
  to { opacity: .95; transform: scale(1.05); }
}

/* MOBILE */
@media(max-width:720px){
  .webchat-glow {
    right: 20px;
    bottom: 20px;
    width: 80px;
    height: 80px;
  }
}

/* ===== OCULTAR CALLBELL HASTA ACTIVAR ===== */
[id*="callbell"],
[class*="callbell"],
iframe[src*="callbell"],
iframe[src*="livechat"] {
  opacity: 0 !important;
  pointer-events: none !important;
}

body.webchat-visible [id*="callbell"],
body.webchat-visible [class*="callbell"],
body.webchat-visible iframe[src*="callbell"],
body.webchat-visible iframe[src*="livechat"] {
  opacity: 1 !important;
  pointer-events: auto !important;
}
</style>
</head>

<body>

<button class="cta" id="abrirWebchat">
ABRIR WEBCHAT
</button>

<div class="webchat-glow"></div>

<script>
const botonWebchat = document.getElementById("abrirWebchat");

botonWebchat.addEventListener("click", function () {

  document.body.classList.add("webchat-visible");

  const comandos = ["open_chat", "openChat", "show", "open"];
  let abierto = false;

  const apis = [window.Callbell, window.callbell];

  for (const api of apis) {
    if (typeof api !== "function") continue;

    for (const cmd of comandos) {
      try {
        api(cmd);
        abierto = true;
        break;
      } catch (e) {}
    }

    if (abierto) break;
  }

  if (!abierto) {
    const launcher = document.querySelector('[id*="callbell"], [class*="callbell"], iframe[src*="callbell"]');
    if (launcher) launcher.click();
  }
});
</script>

<!-- CALLBELL -->
<script>
window.callbellSettings = {
  uuid: "1617cc7d-c306-467c-9c3e-b93be2b26457",
  script_token: "YxhRGuSVgudQ3pPuDJC8cqC8"
};
</script>

<script>
(function(){
  var s=document.createElement("script");
  s.async=true;
  s.src="https://dash.callbell.eu/include/livechat/"+window.callbellSettings.script_token+"/"+window.callbellSettings.uuid+".js";
  document.body.appendChild(s);
})();
</script>

</body>
</html>
