<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINS CRUPIERS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  min-height:100vh;
  background:linear-gradient(160deg,#050303,#3b0707);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.page{max-width:420px;width:100%}

.card{
  border-radius:25px;
  padding:25px;
  background:linear-gradient(180deg,#140505,#070404);
  border:1px solid rgba(255,210,110,.3);
  text-align:center;
}

.logo{
  font-size:42px;
  font-weight:bold;
  color:#d40b0b;
  text-shadow:0 0 10px gold;
}

.badge{
  margin:15px 0;
  color:#ffd36b;
}

h1 span{color:#ffd36b}

.box{
  margin:20px 0;
  padding:15px;
  border-radius:15px;
  background:#5a0505;
}

.amount{
  font-size:40px;
  color:#ffd36b;
}

.cta{
  margin-top:10px;
  width:100%;
  padding:15px;
  border-radius:15px;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

.whatsapp-btn{
  background:linear-gradient(#ffe49a,#e5aa32);
}

.webchat-btn{
  background:linear-gradient(#25d366,#128c4a);
  color:#041b0d;
}

.note{
  margin-top:10px;
  font-size:12px;
  opacity:.7;
}

/* OASIS */
.oasis-overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.8);
}

.oasis-overlay.active{display:flex;}

.oasis-box{
  width:90%;
  max-width:800px;
  background:#140505;
  border-radius:20px;
  padding:25px;
  border:1px solid rgba(255,210,110,.3);
}

.oasis-grid{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.oasis-card{
  padding:12px;
  background:#1e0b0b;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

.close{
  float:right;
  cursor:pointer;
}

@media(max-width:600px){
  .oasis-grid{grid-template-columns:1fr}
}

/* OCULTAR BURBUJA CALLBELL */
iframe[src*="callbell"],
div[class*="callbell"]{
  display:none!important;
}
</style>
</head>

<body>

<div class="page">
  <div class="card">
    <div class="logo">WINS</div>
    <div class="badge">BENEFICIO ACTIVO</div>

    <h1>HOY VOLVES CON <span>VENTAJA</span></h1>

    <div class="box">
      <div>Disponible para tu próxima carga</div>
      <div class="amount">20%</div>
    </div>

    <button class="cta whatsapp-btn" id="abrirOasis">
      RECLAMAR POR WHATSAPP
    </button>

    <button class="cta webchat-btn" id="abrirWebchat" disabled>
      CARGANDO WEBCHAT...
    </button>

    <div class="note">Reclamable por WhatsApp o Webchat</div>
  </div>
</div>

<!-- OASIS -->
<div class="oasis-overlay" id="oasis">
  <div class="oasis-box">
    <div class="close" id="cerrar">X</div>
    <h2>Tu <span style="color:#ffd36b">Wins</span> de Atención</h2>
    <div class="oasis-grid" id="grid"></div>
  </div>
</div>

<script>
const TODOS_LOS_NUMEROS = [
"595993428272","595993600664","595993531681","595994148120",
"595992683436","595992105336","595992693270","595994185084",
"595993421681","595993426758","595993519840","596992119729",
"595976671481","595992894317","595993421542","595994626921",
"595993421241","595993264332","595993253159","595972383786",
"595993426536","595993253595","595993264272","595993264678",
"595991368797","595993038750","595993264389","595993264618",
"595993519515","595972929173","595971629879","595972904825",
"595992117657","595992119721","595993519506"
];

const grid = document.getElementById("grid");

function mezclar(a){return [...a].sort(()=>Math.random()-0.5)}

function cargarOasis(){
  grid.innerHTML="";
  mezclar(TODOS_LOS_NUMEROS).slice(0,6).forEach((num,i)=>{
    const a=document.createElement("a");
    a.href=`https://wa.me/${num}?text=QUIERO20`;
    a.target="_blank";
    a.className="oasis-card";
    a.innerHTML=`Línea ${i+1}<br>${num}`;
    grid.appendChild(a);
  });
}

document.getElementById("abrirOasis").onclick=()=>{
  cargarOasis();
  document.getElementById("oasis").classList.add("active");
};

document.getElementById("cerrar").onclick=()=>{
  document.getElementById("oasis").classList.remove("active");
};

/* WEBCHAT CONTROL */
const btn = document.getElementById("abrirWebchat");

function activarBoton(){
  btn.disabled=false;
  btn.textContent="ABRIR WEBCHAT";
}

btn.onclick=()=>{
  if(window.Callbell){
    window.Callbell('open_chat');
  }
};

const check=setInterval(()=>{
  if(window.Callbell){
    activarBoton();
    clearInterval(check);
  }
},500);
</script>

<!-- CALLBELL -->
<script>
window.callbellSettings = {
  uuid:"1617cc7d-c306-467c-9c3e-b93be2b26457",
  script_token:"YxhRGuSVgudQ3pPuDJC8cqC8"
};
(function(){
  var s=document.createElement('script');
  s.async=true;
  s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';
  document.head.appendChild(s);
})();
</script>

</body>
</html>
