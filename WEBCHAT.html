<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WINS CRUPIERS | Webchat</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #090303;
      color: #ffd36b;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <div>Abriendo webchat...</div>

  <script>
    if (!window.callbellSettings) {
      window.callbellSettings = {};
    }
    window.callbellSettings["uuid"] = "7f79dc65-a855-4b83-82b5-133feeba5938";
    window.callbellSettings["script_token"] = "YxhRGuSVgudQ3pPuDJC8cqC8";

    (function() {
      var w = window;
      var d = document;

      var l = function() {
        var s = d.createElement("script");
        s.async = true;
        s.src = "https://dash.callbell.eu/include/livechat/" + window.callbellSettings.script_token + "/" + window.callbellSettings.uuid + ".js";
        s.onload = function() {
          var intentos = 0;
          var abrir = function() {
            intentos += 1;
            if (typeof window.Callbell === "function") {
              window.Callbell("open_chat");
              return;
            }
            if (intentos < 30) {
              setTimeout(abrir, 200);
            }
          };
          abrir();
        };

        var x = d.getElementsByTagName("script")[0];
        x.parentNode.insertBefore(s, x);
      };

      w.addEventListener("load", l, false);
    })();
  </script>
</body>
</html>
